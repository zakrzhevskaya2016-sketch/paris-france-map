<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Париж — моя карта</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{ --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e7e9ee; --mut:#9aa3b2; --acc:#ff5a7a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,Inter,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  #app{display:flex;flex-direction:column;height:100%}
  header{padding:10px 12px;border-bottom:1px solid var(--line);background:var(--panel)}
  h1{font-size:15px;margin:0 0 8px}
  .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tab{font-size:13px;font-weight:600;padding:6px 12px;border-radius:9px;border:1px solid var(--line);background:#12151b;color:var(--mut);cursor:pointer}
  .tab.on{background:var(--acc);border-color:var(--acc);color:#fff}
  .chip{font-size:12px;padding:5px 9px;border:1px solid var(--line);border-radius:999px;background:#12151b;color:var(--mut);cursor:pointer;user-select:none}
  .chip.on{color:#fff}
  input#q{flex:1;min-width:110px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:#12151b;color:var(--txt)}
  select#daySel{flex:1;min-width:170px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:#12151b;color:var(--txt);font-size:13px;font-weight:600}
  .item .no{display:inline-block;min-width:18px;font-weight:700;color:var(--acc)}
  .btn{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:#12151b;color:var(--txt);cursor:pointer}
  .btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
  main{flex:1;display:flex;min-height:0}
  #map{flex:1;min-height:0}
  #side{width:340px;max-width:46%;border-left:1px solid var(--line);overflow:auto;background:var(--panel)}
  @media(max-width:720px){ main{flex-direction:column} #side{width:auto;max-width:none;height:42%;border-left:0;border-top:1px solid var(--line)} }
  .item{padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .item:hover{background:#12151b}
  .item .nm{font-size:13px;font-weight:600}
  .item .mt{font-size:11px;color:var(--mut);margin-top:2px}
  .badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:6px;margin-right:4px}
  .daychip{font-size:11px;font-weight:700;color:#ffd36b;padding:8px 12px;background:#1d2130;border-bottom:1px solid var(--line);position:sticky;top:0}
  /* эмодзи-метка */
  .mk{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
      font-size:18px;box-shadow:0 1px 4px rgba(0,0,0,.5);border:3px solid #888}
  .mk .cnr{position:absolute;right:-4px;top:-6px;font-size:12px}
  .pop b{font-size:13px}
  .pop .mt{font-size:12px;color:#333;margin:4px 0}
  .pop .acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .pop a,.pop button{font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid #ccc;background:#f6f6f8;color:#111;cursor:pointer;text-decoration:none}
  .pop button.act.on{background:#111;color:#fff;border-color:#111}
  .count{font-size:11px;color:var(--mut);margin-left:auto}
  dialog{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:12px;max-width:92%;width:520px}
  dialog textarea{width:100%;height:180px;background:#0f1115;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="row">
      <span class="tab on" id="tabP" onclick="setView('places')">📍 Места</span>
      <span class="tab" id="tabE" onclick="setView('events')">📅 События</span>
      <span class="tab" id="tabD" onclick="setView('plan')">🗺 План по дням</span>
      <span class="count" id="cnt"></span>
    </div>
    <div id="dayCtrls" style="display:none">
      <div class="row" style="margin-top:8px">
        <select id="daySel" onchange="render()"></select>
        <button class="btn primary" onclick="dayRoute()">🧭 Маршрут дня</button>
      </div>
    </div>
    <div id="placeCtrls">
      <div class="row" id="cats" style="margin-top:8px"></div>
      <div class="row" style="margin-top:6px">
        <span class="chip on" data-st="all" onclick="setStatus('all',this)">Все</span>
        <span class="chip" data-st="want" onclick="setStatus('want',this)">○ Не была</span>
        <span class="chip" data-st="been" onclick="setStatus('been',this)">🟢 Была</span>
        <span class="chip" data-st="fav" onclick="setStatus('fav',this)">❤ Топ</span>
        <span class="chip" data-st="disliked" onclick="setStatus('disliked',this)">👎 Не зашло</span>
        <input id="q" placeholder="поиск…" oninput="render()">
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn primary" onclick="dayRoute()">🧭 Маршрут по видимым точкам</button>
        <button class="btn" onclick="exportMarks()">📤 Экспорт отметок</button>
        <button class="btn" onclick="resetMarks()">↺ Сброс</button>
      </div>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <div id="side"></div>
  </main>
</div>

<dialog id="dlg"><h3 id="dlgt"></h3><textarea id="dlgx" readonly></textarea>
  <div class="row" style="margin-top:8px;justify-content:flex-end">
    <button class="btn" onclick="copyDlg()">Скопировать</button>
    <button class="btn" onclick="document.getElementById('dlg').close()">Закрыть</button>
  </div></dialog>

  "12":"Вт 21.07 · Восток / канал", "13":"Ср 22.07 · Кино Villette", "14":"Чт 23.07 · 🚗 Шантийи",
  "15":"Пт 24.07 · Гастро-день", "16":"Сб 25.07 · 🚗 Мон-Сен-Мишель (бронь ✓, ночёвка)",
  "17":"Вс 26.07 · 🚗 Довиль/Трувиль (бронь ✓) ⚠️+TdF?", "18":"Пн 27.07 · 🚗 Шенонсо",
  "19":"Вт 28.07 · Острова / готика + ботсад", "20":"Ср 29.07 · Вечерний / клубы",
  "21":"Чт 30.07 · Буфер", "22":"Пт 31.07 · Закат / руфтоп", "23":"Сб 01.08 · Отъезд"
};

// порядок дат для календаря
const DATE_ORDER = d => { const m=(d||'').match(/(\d+)/); return m?parseInt(m[1]):99; };

// ---- привязка номеров дней к календарю: день 1 = 10.07.2026 ----
const TRIP_DAY0 = new Date(2026,6,9);            // «нулевой» день; день N = 09.07 + N
function todayDayNum(){                          // какой сейчас день поездки (может быть <1 или >23)
  const t=new Date(); t.setHours(0,0,0,0);
  return Math.round((t-TRIP_DAY0)/864e5);
}

// ---- локальные отметки поверх мастера ----
const LS='parisMarks';
let marks = JSON.parse(localStorage.getItem(LS)||'{}');
function get(p){ const m=marks[p.name]||{}; return {status:m.status??p.status, rating:m.rating??p.rating}; }
function set(name,k,v){ marks[name]=marks[name]||{}; marks[name][k]=v; localStorage.setItem(LS,JSON.stringify(marks)); }

let activeCats = new Set(Object.keys(CATS));
let statusFilter='all';
let view='places';

const map = L.map('map',{zoomControl:true}).setView([48.8566,2.3522],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const layer = L.layerGroup().addTo(map);
const markerByName = {};

// чипы категорий
const catsEl=document.getElementById('cats');
for(const [k,[label,color,emo]] of Object.entries(CATS)){
  const c=document.createElement('span'); c.className='chip on'; c.style.borderColor=color; c.style.color=color;
  c.textContent=emo+' '+label;
  c.onclick=()=>{ c.classList.toggle('on'); c.classList.contains('on')?activeCats.add(k):activeCats.delete(k);
                  c.style.color=c.classList.contains('on')?color:'var(--mut)'; render(); };
  catsEl.appendChild(c);
}

// выпадашка дней: все дни плана (и из DAY_LABELS, и те, где есть точки)
const daysPresent = [...new Set([...Object.keys(DAY_LABELS), ...PLACES.map(p=>String(p.day||'')).filter(Boolean)])]
                    .sort((a,b)=>parseInt(a)-parseInt(b));
const daySelEl=document.getElementById('daySel');

// сколько точек дня ещё не отмечено «была» (👎 не считаем — сознательно отказалась)
function dayMissed(dnum){
  const pts=PLACES.filter(p=>String(p.day)===String(dnum));
  return {total:pts.length,
          missed:pts.filter(p=>{const g=get(p); return g.status!=='была' && g.rating!=='👎';}).length};
}
// подпись дня в выпадашке: прошёл/сегодня/впереди + счётчик пропущенного
function dayOptText(dnum){
  const tn=todayDayNum(), n=parseInt(dnum), s=dayMissed(dnum);
  let mark='';
  if(n<tn)       mark = s.missed ? ' · ⏮ пропущено '+s.missed : (s.total ? ' · ✅ всё' : '');
  else if(n===tn)mark = ' · 📍 СЕГОДНЯ';
  return 'День '+dnum+' — '+(DAY_LABELS[dnum]||'')+mark;
}
function refreshDayOptions(){
  for(const o of daySelEl.options) o.textContent=dayOptText(o.value);
}
for(const dnum of daysPresent){
  const o=document.createElement('option');
  o.value=dnum; o.textContent=dayOptText(dnum);
  daySelEl.appendChild(o);
}
// по умолчанию открываем СЕГОДНЯШНИЙ день (если поездка идёт)
{ const tn=String(todayDayNum());
  if(daysPresent.includes(tn)) daySelEl.value=tn; }

function setStatus(s,el){ statusFilter=s; document.querySelectorAll('[data-st]').forEach(x=>x.classList.remove('on')); el.classList.add('on'); render(); }
function setView(v){ view=v;
  document.getElementById('tabP').classList.toggle('on',v==='places');
  document.getElementById('tabE').classList.toggle('on',v==='events');
  document.getElementById('tabD').classList.toggle('on',v==='plan');
  document.getElementById('placeCtrls').style.display = v==='places'?'block':'none';
  document.getElementById('dayCtrls').style.display   = v==='plan'  ?'block':'none';
  render();
}

// цвет кольца по статусу
function ringColor(p){ const g=get(p);
  if(g.status==='была'){ if(g.rating==='❤')return'#e0245e'; if(g.rating==='👎')return'#888';
                         if(g.rating==='😐')return'#e6a817'; return'#2ecc55'; }
  return CATS[p.cat][1];
}
function statusLabel(p){ const g=get(p);
  return g.status==='была' ? ('✅ была '+(g.rating||'')) : '○ не была';
}

function pass(p){
  if(view==='plan'){                      // режим плана: только точки выбранного дня
    return String(p.day) === document.getElementById('daySel').value;
  }
  if(view==='events') return !!p.date;   // календарь: всё, у чего есть дата (события + Мельница и т.п.)
  const g=get(p);
  if(statusFilter==='disliked') return g.rating==='👎';  // спец-фильтр: показать только 👎
  if(g.rating==='👎') return false;                       // 👎 УБИРАЕТСЯ с карты по умолчанию
  if(!activeCats.has(p.cat)) return false;
  if(statusFilter==='been' && g.status!=='была') return false;
  if(statusFilter==='want' && g.status==='была') return false;
  if(statusFilter==='fav' && g.rating!=='❤') return false;
  const q=document.getElementById('q').value.trim().toLowerCase();
  if(q && !(p.name+' '+p.note+' '+p.query).toLowerCase().includes(q)) return false;
  return true;
}

function gmaps(p){ return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.query||`${p.lat},${p.lng}`); }

function icon(p){
  const g=get(p); const emo=CATS[p.cat][2]; const ring=ringColor(p);
  const cnr = g.rating==='❤'?'❤️': g.status==='была'?'✅':'';
  return L.divIcon({className:'', iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-16],
    html:`<div class="mk" style="border-color:${ring};position:relative">${emo}<span class="cnr">${cnr}</span></div>`});
}

function popupHtml(p){
  const g=get(p); const q=n=>n.replace(/'/g,"\\'");
  const ev = p.date? `<div class="mt">📅 <b>${p.date}</b>${p.time?' · '+p.time:''}</div>`:'';
  const dl = (p.day && DAY_LABELS[p.day])? `<div class="mt">🗺 <b>День ${p.day}</b> · ${DAY_LABELS[p.day]}</div>`:'';
  return `<div class="pop"><b>${p.name}</b>${p.sure?'':' ⚠️'}
    ${ev}${dl}<div class="mt">${p.note}</div>
    <div class="acts">
      <a href="${gmaps(p)}" target="_blank">📍 Google Maps</a>
      <button class="act ${g.status==='была'?'on':''}" onclick="toggle('${q(p.name)}','status','была',this)">✓ Была</button>
      <button class="act ${g.rating==='❤'?'on':''}" onclick="toggle('${q(p.name)}','rating','❤',this)">❤</button>
      <button class="act ${g.rating==='😐'?'on':''}" onclick="toggle('${q(p.name)}','rating','😐',this)">😐</button>
      <button class="act ${g.rating==='👎'?'on':''}" onclick="toggle('${q(p.name)}','rating','👎',this)">👎</button>
    </div></div>`;
}
function toggle(name,k,v,btn){
  const p=PLACES.find(x=>x.name===name);
  const cur=(marks[name]&&marks[name][k]) || p[k] || '';
  set(name,k, cur===v?'':v);
  render();
  if(markerByName[name]){ markerByName[name].setIcon(icon(p)); markerByName[name].setPopupContent(popupHtml(p)); }
}

function render(){
  refreshDayOptions();   // обновляем счётчики «пропущено» в выпадашке после отметок
  layer.clearLayers(); const side=document.getElementById('side'); side.innerHTML=''; let n=0;
  const list = PLACES.filter(pass);
  // метки на карте
  for(const p of list){ n++;
    const m=L.marker([p.lat,p.lng],{icon:icon(p)});
    m.bindPopup(popupHtml(p)); m.addTo(layer); markerByName[p.name]=m;
  }
  if(view==='events'){
    // календарь: сортировка по дате
    list.sort((a,b)=>DATE_ORDER(a.date)-DATE_ORDER(b.date) || a.name.localeCompare(b.name));
    let curDate=null;
    for(const p of list){
      if(p.date!==curDate){ curDate=p.date;
        const h=document.createElement('div'); h.className='daychip'; h.textContent='📅 '+(p.date||'без даты'); side.appendChild(h); }
      const it=document.createElement('div'); it.className='item';
      it.innerHTML=`<div class="nm">${CATS[p.cat][2]} ${p.name}</div>
        <div class="mt">${p.time?'🕘 '+p.time+' · ':''}${p.note}</div>
        <div class="mt"><a href="${gmaps(p)}" target="_blank" style="color:#7ab8ff">📍 маршрут в Google Maps</a></div>`;
      it.onclick=(e)=>{ if(e.target.tagName!=='A'){ map.setView([p.lat,p.lng],15); markerByName[p.name].openPopup(); } };
      side.appendChild(it);
    }
  } else if(view==='plan'){
    // режим плана: шапка дня (прошёл/сегодня/впереди) + пронумерованный список точек
    const dnum=document.getElementById('daySel').value;
    const tn=todayDayNum(), n=parseInt(dnum), s=dayMissed(dnum);
    const h=document.createElement('div'); h.className='daychip';
    const when = n<tn ? (s.missed?' · день прошёл, ⏮ пропущено '+s.missed:' · день прошёл ✅')
               : n===tn ? ' · 📍 СЕГОДНЯ' : '';
    h.textContent='🗺 День '+dnum+' — '+(DAY_LABELS[dnum]||'')+when;
    side.appendChild(h);
    if(!list.length){
      const it=document.createElement('div'); it.className='item';
      it.innerHTML='<div class="mt">На этот день точки не привязаны — свободный день / буфер.</div>';
      side.appendChild(it);
    }
    let i=0;
    for(const p of list){ i++;
      const g=get(p);
      // отметка визита: ✅/❤ если была; ⏮ если день уже прошёл, а точка не закрыта
      const vis = g.status==='была' ? ' <span>✅'+(g.rating||'')+'</span>'
                : (n<tn && g.rating!=='👎') ? ' <span style="color:#ff8888">⏮ пропущено</span>' : '';
      const it=document.createElement('div'); it.className='item';
      it.innerHTML=`<div class="nm"><span class="no">${i}.</span> ${CATS[p.cat][2]} ${p.name}${vis}</div>
        <div class="mt">${p.time?'🕘 '+p.time+' · ':''}${p.note}</div>
        <div class="mt"><a href="${gmaps(p)}" target="_blank" style="color:#7ab8ff">📍 маршрут в Google Maps</a></div>`;
      it.onclick=(e)=>{ if(e.target.tagName!=='A'){ map.setView([p.lat,p.lng],15); markerByName[p.name].openPopup(); } };
      side.appendChild(it);
    }
  } else {
    for(const p of list){
      const [label,color,emo]=CATS[p.cat]; const g=get(p);
      const it=document.createElement('div'); it.className='item';
      it.innerHTML=`<div class="nm">${emo} ${p.name} ${g.rating||''}</div>
        <div class="mt"><span class="badge" style="background:${color}22;color:${color}">${label}</span>
        ${statusLabel(p)} · <span style="opacity:.7">${p.src}</span></div>`;
      it.onclick=()=>{ map.setView([p.lat,p.lng],15); markerByName[p.name].openPopup(); };
      side.appendChild(it);
    }
  }
  document.getElementById('cnt').textContent=`(${n})`;
  if((view==='events'||view==='plan') && list.length){ const b=L.latLngBounds(list.map(p=>[p.lat,p.lng])); map.fitBounds(b.pad(0.3)); }
}

function dayRoute(){
  const pts=PLACES.filter(pass);
  if(pts.length<2){ alert('Нужно минимум 2 видимых точки'); return; }
  if(pts.length>10) alert('Точек >10 — Google-Карты покажут первые ~10. Сузь фильтром.');
  const path=pts.slice(0,10).map(p=>`${p.lat},${p.lng}`).join('/');
  window.open(`https://www.google.com/maps/dir/${path}/data=!4m2!4m1!3e2`,'_blank');
}
function exportMarks(){
  const lines=['Мои отметки (впиши в мастер):',''];
  for(const p of PLACES){ const g=get(p); if(g.status||g.rating) lines.push(`- ${p.name}: ${g.status||'—'} ${g.rating||''}`.trim()); }
  document.getElementById('dlgt').textContent='📤 Экспорт отметок';
  document.getElementById('dlgx').value=lines.join('\n'); document.getElementById('dlg').showModal();
}
function copyDlg(){ const t=document.getElementById('dlgx'); t.select(); document.execCommand('copy'); }
function resetMarks(){ if(confirm('Сбросить твои локальные отметки?')){ marks={}; localStorage.removeItem(LS); render(); } }

render();
</script>
</body>
</html>
